{% set name = "sqlalchemy_exasol" %}
{% set version = "5.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7bde8e9cab6d6822e513dcebb622572928b4540e10bb11fd77a4e7d3f60e9823

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry >=1
    - setuptools_scm
  run:
    - packaging >=21.3
    - pyexasol >=0.26.0,<2
    - python >={{ python_min }}
    - sqlalchemy >=1.4,<2
    - pyodbc >=4.0.34,<6
    - six >=1.5

test:
  requires:
    - python {{ python_min }}
  imports:
    - sqlalchemy_exasol

about:
  home: http://github.com/blue-yonder/sqlalchemy_exasol
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: SQLAlchemy dialect for EXASOL

extra:
  recipe-maintainers:
    - xhochy
