{% set name = "sqlalchemy_exasol" %}
{% set version = "6.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8bf7639d1cf21a81b855e4a636d059ac05d07c24e620c1ff63783a2d4826d84e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - poetry >=1
    - setuptools_scm
  run:
    - packaging >=21.3
    - pyexasol >=0.26.0,<3.0
    - python >={{ python_min }}
    - sqlalchemy >=2.0.0,<2.0.45
    - pyodbc >=4.0.34,<6
    - six >=1.5

test:
  requires:
    - python {{ python_min }}
  imports:
    - sqlalchemy_exasol

about:
  home: http://github.com/blue-yonder/sqlalchemy_exasol
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: SQLAlchemy dialect for EXASOL

extra:
  recipe-maintainers:
    - xhochy
